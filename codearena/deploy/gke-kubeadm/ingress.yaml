# Front the CodeArena server with the ingress-nginx controller already running
# on the cluster. The long proxy timeouts keep the /ws WebSocket (live run
# output) from being cut after the default 60s.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codearena
  namespace: codearena
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: codearena.orbit.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: codearena-server
                port:
                  number: 80
